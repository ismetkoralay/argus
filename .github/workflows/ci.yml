name: CI
on:
  push: { branches: [main] }
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: 1.26.5 }
      - uses: golangci/golangci-lint-action@v8
        with: { version: v2.12.2 }

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: argus
          POSTGRES_PASSWORD: argus
          POSTGRES_DB: argus_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U argus"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: 1.26.5 }
      - run: go test -race -coverprofile=coverage.out ./...
        env:
          # Exercises internal/history's tests against a real Postgres
          # instead of skipping them (see internal/history/store_test.go).
          TEST_DATABASE_URL: postgres://argus:argus@localhost:5432/argus_test?sslmode=disable
      - uses: actions/upload-artifact@v4
        with: { name: coverage, path: coverage.out }

  docker:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: service:ci
