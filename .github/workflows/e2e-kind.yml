name: E2E (kind)
on:
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with: { context: ., push: false, load: true, tags: service:latest }

      - name: Create kind cluster
        uses: helm/kind-action@v1

      - name: Load image into kind
        run: kind load docker-image service:latest --name chart-testing

      - name: Deploy manifests
        run: |
          kubectl apply -k k8s/
          kubectl rollout status deployment/service --timeout=120s

      - name: Smoke test /healthz
        run: |
          kubectl port-forward svc/service 8080:8080 >/dev/null 2>&1 &
          sleep 5
          curl -fsS http://localhost:8080/healthz
