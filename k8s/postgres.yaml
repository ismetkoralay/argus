# Optional Postgres for review-history persistence (internal/history).
# Deliberately NOT part of kustomization.yaml's base resource list, so the
# default `kubectl apply -k k8s/` deploy stays stateless per TECH_DESIGN.md
# §4. To opt in:
#   kubectl apply -f k8s/postgres.yaml
#   kubectl rollout status deployment/postgres
#   # add DATABASE_URL to your real k8s/secret.yaml (see secret.example.yaml),
#   # pointing at postgres://argus:argus@postgres:5432/argus?sslmode=disable
#   kubectl rollout restart deployment/argus
#
# Fixed dev credentials, same as docker-compose's postgres service — this is
# a throwaway/demo database for a kind cluster, not a production one.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  labels: { app: postgres }
spec:
  replicas: 1
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports: [{ containerPort: 5432 }]
          env:
            - name: POSTGRES_USER
              value: "argus"
            - name: POSTGRES_PASSWORD
              value: "argus"
            - name: POSTGRES_DB
              value: "argus"
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "argus"] }
            initialDelaySeconds: 5
          livenessProbe:
            exec: { command: ["pg_isready", "-U", "argus"] }
            initialDelaySeconds: 10
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { cpu: 500m, memory: 512Mi }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests: { storage: 1Gi }
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  selector: { app: postgres }
  ports:
    - port: 5432
      targetPort: 5432
