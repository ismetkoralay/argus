# Template only — placeholder values, never commit real secrets.
# Copy to k8s/secret.yaml (git-ignored), fill in real values, then either
# `kubectl apply -f k8s/secret.yaml` directly, or generate one imperatively:
#   kubectl create secret generic argus-secrets \
#     --from-literal=GITHUB_APP_ID=<id> \
#     --from-file=GITHUB_APP_PRIVATE_KEY=<path-to-pem> \
#     --from-literal=GITHUB_WEBHOOK_SECRET=<secret>
# Non-secret config (OLLAMA_BASE_URL, OLLAMA_MODEL, LOG_LEVEL) lives in
# configmap.yaml instead, applied automatically via kustomization.yaml.
apiVersion: v1
kind: Secret
metadata:
  name: argus-secrets
type: Opaque
stringData:
  GITHUB_APP_ID: "REPLACE_ME"
  GITHUB_APP_PRIVATE_KEY: |
    -----BEGIN RSA PRIVATE KEY-----
    REPLACE_ME
    -----END RSA PRIVATE KEY-----
  GITHUB_WEBHOOK_SECRET: "REPLACE_ME"
