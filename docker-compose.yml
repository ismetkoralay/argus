services:
  argus:
    build: .
    ports: ["8080:8080"]
    environment:
      - PORT=8080
      - GITHUB_APP_ID=${GITHUB_APP_ID}
      - GITHUB_APP_PRIVATE_KEY=${GITHUB_APP_PRIVATE_KEY}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
      # host.docker.internal resolves to the host machine, where `ollama
      # serve` is expected to be running (see TECH_DESIGN.md §5) — the
      # container's own localhost is not the host's.
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5-coder}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    extra_hosts:
      # host.docker.internal is automatic on Docker Desktop (macOS/Windows);
      # this makes it resolve on Linux Docker too.
      - "host.docker.internal:host-gateway"
