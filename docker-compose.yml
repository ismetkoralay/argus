services:
  service:
    build: .
    ports: ["8080:8080"]
    environment:
      - DATABASE_URL=postgres://app:app@postgres:5432/argus?sslmode=disable
      - REDIS_URL=redis://redis:6379
    depends_on: [postgres, redis]

  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: argus
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]

  redis:
    image: redis:8
    ports: ["6379:6379"]

volumes:
  pgdata:
